<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - StudyNote</title>
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <div class="card">
        <!-- Logo -->
        <div class="logo">
            <i class="fas fa-book-open logo-icon"></i>
            <span class="logo-text">Study Note</span>
        </div>

        <!-- Auth Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</button>
            <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <!-- Alert -->
        <div class="alert" id="alertBox">
            <i class="fas fa-circle-exclamation"></i>
            <span id="alertMsg"></span>
        </div>

        <!-- ══ LOGIN FORM ══ -->
        <div class="form-section active" id="loginForm">
            <!-- Role Toggle -->
            <p class="section-label">Loại tài khoản</p>
            <div class="role-toggle">
                <button class="role-btn active" id="roleUser" onclick="selectRole('user')">
                    <i class="fas fa-user"></i>
                    User
                </button>
                <button class="role-btn" id="roleAdmin" onclick="selectRole('admin')">
                    <i class="fas fa-lock"></i>
                    Admin
                </button>
            </div>

            <div class="form-group">
                <label>UserName</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="loginUsername" placeholder="your user name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
                    <button class="eye-btn" onclick="togglePwd('loginPassword', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="forgot-link"><a href="#">Quên mật khẩu?</a></div>

            <button class="submit-btn" id="loginBtn">
                <i class="fas fa-right-to-bracket"></i>
                Đăng nhập
            </button>

            <div class="divider">hoặc tiếp tục với</div>
            <div class="social-btns">
                <button class="social-btn" onclick="showAlert('Tính năng Google đang phát triển', 'error')">
                    <i class="fab fa-google" style="color:#EA4335"></i> Google
                </button>
                <button class="social-btn" onclick="showAlert('Tính năng Facebook đang phát triển', 'error')">
                    <i class="fab fa-facebook" style="color:#1877F2"></i> Facebook
                </button>
            </div>
        </div>

        <!-- ══ REGISTER FORM ══ -->
        <div class="form-section" id="registerForm">
            <div class="form-group">
                <label>Họ và tên</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regName" placeholder="VD: Nguyễn Văn A" autocomplete="name">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="regEmail" placeholder="VD: your@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
                    <button class="eye-btn" onclick="togglePwd('regPassword', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <div class="input-wrap">
                    <i class="fas fa-shield-halved"></i>
                    <input type="password" id="regConfirm" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                    <button class="eye-btn" onclick="togglePwd('regConfirm', this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button class="submit-btn" id="registerBtn" >
                <i class="fas fa-user-plus"></i>
                Tạo tài khoản
            </button>

            <p class="demo-hint" style="margin-top:14px">Đã có tài khoản? <a href="#" onclick="switchTab('login')" style="color:#5c4de8;font-weight:600;text-decoration:none">Đăng nhập ngay</a></p>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="JavaScript/API_JS/API.js"></script>
    <script src="JavaScript/LOGIN/login.js"></script>
</body>
</html>
