<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - StudyNote</title>
    <link rel="stylesheet" href="CSS/login.css" />
  </head>
  <body>
    <div class="card">
      <!-- Logo -->
      <div class="logo">
        <i class="fas fa-book-open logo-icon"></i>
        <span class="logo-text">Study Note</span>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button
          class="auth-tab active"
          id="tabLogin"
          onclick="switchTab('login')"
        >
          Đăng nhập
        </button>
        <button
          class="auth-tab"
          id="tabRegister"
          onclick="switchTab('register')"
        >
          Đăng ký
        </button>
      </div>

      <!-- Alert -->
      <div class="alert" id="alertBox">
        <i class="fas fa-circle-exclamation"></i>
        <span id="alertMsg"></span>
      </div>

      <!-- ══ LOGIN FORM ══ -->
      <div class="form-section active" id="loginForm">
        <!-- Role Toggle -->
        <p class="section-label">Loại tài khoản</p>
        <div class="role-toggle">
          <button
            class="role-btn active"
            id="roleUser"
            onclick="selectRole('user')"
          >
            <i class="fas fa-user"></i>
            User
          </button>
          <button class="role-btn" id="roleAdmin" onclick="selectRole('admin')">
            <i class="fas fa-lock"></i>
            Admin
          </button>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="loginEmail"
              placeholder="your@email.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button
              class="eye-btn"
              onclick="togglePwd('loginPassword', this)"
              tabindex="-1"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="forgot-link"><a href="#">Quên mật khẩu?</a></div>

        <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
          <i class="fas fa-right-to-bracket"></i>
          Đăng nhập
        </button>

        <div class="divider">hoặc tiếp tục với</div>
        <div class="social-btns">
          <button
            class="social-btn"
            onclick="showAlert('Tính năng Google đang phát triển', 'error')"
          >
            <i class="fab fa-google" style="color: #ea4335"></i> Google
          </button>
          <button
            class="social-btn"
            onclick="showAlert('Tính năng Facebook đang phát triển', 'error')"
          >
            <i class="fab fa-facebook" style="color: #1877f2"></i> Facebook
          </button>
        </div>

        <p class="demo-hint">Demo: Nhập bất kỳ email/password để truy cập</p>
      </div>

      <!-- ══ REGISTER FORM ══ -->
      <div class="form-section" id="registerForm">
        <div class="form-group">
          <label>Họ và tên</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input
              type="text"
              id="regName"
              placeholder="Nguyễn Văn A"
              autocomplete="name"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="regEmail"
              placeholder="your@email.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="regPassword"
              placeholder="Ít nhất 6 ký tự"
              autocomplete="new-password"
            />
            <button
              class="eye-btn"
              onclick="togglePwd('regPassword', this)"
              tabindex="-1"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Xác nhận mật khẩu</label>
          <div class="input-wrap">
            <i class="fas fa-shield-halved"></i>
            <input
              type="password"
              id="regConfirm"
              placeholder="Nhập lại mật khẩu"
              autocomplete="new-password"
            />
            <button
              class="eye-btn"
              onclick="togglePwd('regConfirm', this)"
              tabindex="-1"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="submit-btn" id="registerBtn" onclick="handleRegister()">
          <i class="fas fa-user-plus"></i>
          Tạo tài khoản
        </button>

        <p class="demo-hint" style="margin-top: 14px">
          Đã có tài khoản?
          <a
            href="#"
            onclick="switchTab('login')"
            style="color: #5c4de8; font-weight: 600; text-decoration: none"
            >Đăng nhập ngay</a
          >
        </p>
      </div>
    </div>

    <script>
      // ──────────────────────────────────────
      //  STATE
      // ──────────────────────────────────────
      let currentRole = "user"; // 'user' | 'admin'

      // ──────────────────────────────────────
      //  TAB SWITCH
      // ──────────────────────────────────────
      function switchTab(tab) {
        document
          .getElementById("loginForm")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("registerForm")
          .classList.toggle("active", tab === "register");
        document
          .getElementById("tabLogin")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tabRegister")
          .classList.toggle("active", tab === "register");
        hideAlert();
      }

      // ──────────────────────────────────────
      //  ROLE TOGGLE
      // ──────────────────────────────────────
      function selectRole(role) {
        currentRole = role;
        document
          .getElementById("roleUser")
          .classList.toggle("active", role === "user");
        document
          .getElementById("roleAdmin")
          .classList.toggle("active", role === "admin");
        hideAlert();
      }

      // ──────────────────────────────────────
      //  PASSWORD VISIBILITY
      // ──────────────────────────────────────
      function togglePwd(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.className = "fas fa-eye-slash";
        } else {
          input.type = "password";
          icon.className = "fas fa-eye";
        }
      }

      // ──────────────────────────────────────
      //  ALERT HELPERS
      // ──────────────────────────────────────
      function showAlert(msg, type = "error") {
        const box = document.getElementById("alertBox");
        const msgEl = document.getElementById("alertMsg");
        box.className = `alert alert-${type} show`;
        const icon = box.querySelector("i");
        icon.className =
          type === "error"
            ? "fas fa-circle-exclamation"
            : "fas fa-circle-check";
        msgEl.textContent = msg;
      }
      function hideAlert() {
        document.getElementById("alertBox").classList.remove("show");
      }

      // ──────────────────────────────────────
      //  LOADING STATE
      // ──────────────────────────────────────
      function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.classList.toggle("loading", loading);
        if (loading) {
          btn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
        }
      }
      function resetBtn(btnId, html) {
        const btn = document.getElementById(btnId);
        btn.classList.remove("loading");
        btn.innerHTML = html;
      }

      // ──────────────────────────────────────
      //  LOGIN
      // ──────────────────────────────────────
      function handleLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        if (!email) {
          showAlert("Vui lòng nhập email.");
          return;
        }
        if (!isValidEmail(email)) {
          showAlert("Email không hợp lệ.");
          return;
        }
        if (!password) {
          showAlert("Vui lòng nhập mật khẩu.");
          return;
        }
        if (password.length < 3) {
          showAlert("Mật khẩu quá ngắn.");
          return;
        }

        setLoading("loginBtn", true);
        hideAlert();

        // Simulate async login
        setTimeout(() => {
          const users = JSON.parse(
            localStorage.getItem("studyNoteUsers") || "[]",
          );
          const found = users.find(
            (u) => u.email === email && u.password === password,
          );

          if (found) {
            // Registered user
            localStorage.setItem(
              "loggedInUser",
              JSON.stringify({
                email: found.email,
                name: found.name,
                role: found.role,
              }),
            );
            showAlert("Đăng nhập thành công! Đang chuyển trang...", "success");
            setTimeout(() => {
              const role = found.role;
              window.location.href =
                role === "admin" ? "admin.html" : "use.html";
            }, 800);
          } else if (currentRole === "admin") {
            // Admin demo
            localStorage.setItem(
              "loggedInUser",
              JSON.stringify({ email, name: "Admin", role: "admin" }),
            );
            showAlert("Đăng nhập admin thành công!", "success");
            setTimeout(() => {
              window.location.href = "admin.html";
            }, 800);
          } else {
            // User demo — any email/password works
            localStorage.setItem(
              "loggedInUser",
              JSON.stringify({
                email,
                name: email.split("@")[0],
                role: "user",
              }),
            );
            showAlert("Đăng nhập thành công!", "success");
            setTimeout(() => {
              window.location.href = "use.html";
            }, 800);
          }
        }, 900);
      }

      // ──────────────────────────────────────
      //  REGISTER
      // ──────────────────────────────────────
      function handleRegister() {
        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirm = document.getElementById("regConfirm").value;

        if (!name) {
          showAlert("Vui lòng nhập họ và tên.");
          return;
        }
        if (!email) {
          showAlert("Vui lòng nhập email.");
          return;
        }
        if (!isValidEmail(email)) {
          showAlert("Email không hợp lệ.");
          return;
        }
        if (password.length < 6) {
          showAlert("Mật khẩu phải ít nhất 6 ký tự.");
          return;
        }
        if (password !== confirm) {
          showAlert("Mật khẩu xác nhận không khớp.");
          return;
        }

        const users = JSON.parse(
          localStorage.getItem("studyNoteUsers") || "[]",
        );
        if (users.find((u) => u.email === email)) {
          showAlert("Email này đã được đăng ký.");
          return;
        }

        setLoading("registerBtn", true);
        hideAlert();

        setTimeout(() => {
          users.push({
            name,
            email,
            password,
            role: "user",
            createdAt: new Date().toISOString(),
          });
          localStorage.setItem("studyNoteUsers", JSON.stringify(users));
          localStorage.setItem(
            "loggedInUser",
            JSON.stringify({ email, name, role: "user" }),
          );
          showAlert(
            "Tạo tài khoản thành công! Đang chuyển trang...",
            "success",
          );
          setTimeout(() => {
            window.location.href = "use.html";
          }, 800);
        }, 900);
      }

      // ──────────────────────────────────────
      //  UTILS
      // ──────────────────────────────────────
      function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      // Enter key support
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const loginActive = document
          .getElementById("loginForm")
          .classList.contains("active");
        if (loginActive) handleLogin();
        else handleRegister();
      });

      // Auto-redirect if already logged in
      const existing = JSON.parse(
        localStorage.getItem("loggedInUser") || "null",
      );
      if (existing) {
        window.location.href =
          existing.role === "admin" ? "admin.html" : "use.html";
      }
    </script>
  </body>
</html>
